<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Four Anchors Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --gold-pale: #f5edda;
      --dark: #1a1410;
      --dark-2: #241c14;
      --dark-3: #2e2318;
      --cream: #f7f2e8;
      --warm-white: #fdfaf3;
      --text-on-dark: rgba(245,237,218,0.82);
      --text-muted: rgba(245,237,218,0.42);
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50%      { opacity: 0.65; transform: scale(1.06); }
    }
    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 24px 56px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(26,20,16,0.96), transparent);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold-light);
    }
    .nav-cta {
      font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,0.4); padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }
    .nav-cta:hover { color: var(--gold-light); border-color: var(--gold-light); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      position: relative; overflow: hidden;
      padding: 120px 40px 100px;
    }
    .hero-glow {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
      animation: glowPulse 6s ease-in-out infinite;
      pointer-events: none;
    }
    .hero-glow-2 {
      position: absolute; top: 30%; left: 50%;
      transform: translate(-50%,-50%);
      width: 400px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,213,163,0.08) 0%, transparent 70%);
      animation: glowPulse 8s ease-in-out infinite reverse;
      pointer-events: none;
    }
    .hero-logo {
      width: min(320px, 60vw);
      position: relative; z-index: 1;
      animation: fadeUp 1.4s ease 0.1s both;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.3));
    }
    .hero-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 28px;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 0.5s both;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 5vw, 5rem);
      font-weight: 300; line-height: 1.15;
      color: var(--warm-white); margin-bottom: 28px;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 0.7s both;
    }
    .hero-title em { font-style: italic; color: var(--gold-light); }
    .hero-sub {
      font-size: 1rem; line-height: 1.9;
      color: var(--text-on-dark); max-width: 520px; margin: 0 auto 48px;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 0.9s both;
    }
    .anchors-row {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 52px; flex-wrap: wrap;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 1.0s both;
    }
    .anchor-pill {
      font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--gold-light);
      background: rgba(201,168,76,0.06);
    }
    .form-wrap {
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 1.1s both;
      width: 100%; max-width: 480px;
    }
    .form-label {
      font-size: 0.67rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px; display: block;
    }
    .form-row { display: flex; }
    .form-row input {
      flex: 1; padding: 15px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.25); border-right: none;
      font-family: 'Jost', sans-serif; font-size: 0.88rem;
      color: var(--cream); outline: none; transition: border-color 0.3s;
    }
    .form-row input::placeholder { color: rgba(245,237,218,0.28); }
    .form-row input:focus { border-color: rgba(201,168,76,0.6); }
    .form-row button {
      padding: 15px 28px; background: var(--gold); color: var(--dark);
      border: 1px solid var(--gold);
      font-family: 'Jost', sans-serif; font-size: 0.67rem;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s; white-space: nowrap;
    }
    .form-row button:hover { background: var(--gold-light); }
    .form-note { font-size: 0.72rem; color: var(--text-muted); margin-top: 12px; }
    .success-msg {
      display: none; font-size: 0.85rem;
      color: var(--gold-light); margin-top: 16px; font-style: italic;
    }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 28px; padding: 72px 80px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
    }
    .divider-icon { width: 48px; opacity: 0.5; }

    /* FRAMEWORK */
    .framework { padding: 40px 80px 120px; position: relative; }
    .framework::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.05), transparent 70%);
      pointer-events: none;
    }
    .section-label {
      font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px;
    }
    .section-label::after {
      content: ''; display: block; width: 36px; height: 1px;
      background: rgba(201,168,76,0.4);
    }
    .framework-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 3.5vw, 3.8rem);
      font-weight: 300; color: var(--warm-white);
      line-height: 1.2; margin-bottom: 20px; max-width: 600px;
    }
    .framework-intro {
      font-size: 0.93rem; line-height: 1.9;
      color: var(--text-on-dark); max-width: 500px; margin-bottom: 72px;
    }
    .anchors-grid {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 1px;
      background: rgba(201,168,76,0.1);
    }
    .anchor-card {
      background: var(--dark-2); padding: 44px 32px;
      position: relative; overflow: hidden; transition: background 0.4s;
    }
    .anchor-card:hover { background: var(--dark-3); }
    .anchor-top-line {
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: var(--gold); opacity: 0.5;
    }
    .anchor-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem; font-weight: 300;
      color: rgba(201,168,76,0.2); line-height: 1; margin-bottom: 20px;
    }
    .anchor-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem; font-weight: 400;
      color: var(--gold-light); margin-bottom: 16px;
    }
    .anchor-desc { font-size: 0.84rem; line-height: 1.85; color: var(--text-on-dark); }

    /* PHILOSOPHY */
    .philosophy {
      padding: 120px 80px; background: var(--dark-2);
      position: relative; overflow: hidden; text-align: center;
    }
    .philosophy::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 800px; height: 400px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.07), transparent 70%);
      pointer-events: none;
    }
    .philosophy-icon {
      width: 80px; margin: 0 auto 48px; opacity: 0.7;
      position: relative; z-index: 1;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
    }
    .philosophy-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3vw, 3.2rem);
      font-weight: 300; font-style: italic;
      color: var(--warm-white); line-height: 1.45;
      max-width: 700px; margin: 0 auto 32px;
      position: relative; z-index: 1;
    }
    .philosophy-quote span { color: var(--gold-light); }
    .philosophy-attr {
      font-size: 0.68rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold); position: relative; z-index: 1;
    }
    .philosophy-body {
      font-size: 0.93rem; line-height: 2; color: var(--text-on-dark);
      max-width: 560px; margin: 48px auto 0; position: relative; z-index: 1;
    }
    .philosophy-body p + p { margin-top: 20px; }

    /* ── MISSION ── */
    .mission {
      padding: 140px 80px;
      background: var(--dark);
      position: relative;
      overflow: hidden;
      text-align: center;
    }
    .mission::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 900px; height: 900px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.055) 0%, transparent 65%);
      pointer-events: none;
    }
    .mission-inner {
      max-width: 780px;
      margin: 0 auto;
      position: relative; z-index: 1;
    }
    .mission-top {
      display: flex; align-items: center; gap: 20px;
      justify-content: center; margin-bottom: 44px;
    }
    .mission-rule {
      width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.5));
    }
    .mission-top .mission-rule:last-child {
      background: linear-gradient(to left, transparent, rgba(201,168,76,0.5));
    }
    .mission-label {
      font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold);
    }
    .mission-statement {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 3.5vw, 3.8rem);
      font-weight: 300; line-height: 1.2;
      color: var(--warm-white);
      margin-bottom: 56px;
    }
    .mission-statement em { font-style: italic; color: var(--gold-light); }
    .mission-body {
      text-align: left;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(201,168,76,0.1);
      padding: 56px 64px;
      margin-bottom: 56px;
    }
    .mission-body p {
      font-size: 0.95rem; line-height: 2.1;
      color: var(--text-on-dark);
    }
    .mission-divider {
      display: flex; align-items: center; gap: 20px;
      margin: 36px 0;
    }
    .mission-divider span:not(.mission-dot) {
      flex: 1; height: 1px;
      background: rgba(201,168,76,0.15);
    }
    .mission-dot {
      font-size: 0.6rem; color: var(--gold); opacity: 0.6;
    }
    .mission-closing {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 2.2vw, 2rem);
      font-style: italic; font-weight: 300;
      color: var(--gold-light);
      line-height: 1.7;
    }

    /* ── MEET THE FOUNDER ── */
    .founder {
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 80vh;
      position: relative;
    }
    .founder-image-col {
      position: relative;
      overflow: hidden;
    }
    .founder-image-col img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      filter: brightness(0.88) saturate(0.9);
      transition: transform 8s ease;
    }
    .founder-image-col:hover img { transform: scale(1.03); }
    .founder-image-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--dark) 100%),
                  linear-gradient(to bottom, transparent 70%, rgba(26,20,16,0.5) 100%);
    }
    .founder-image-caption {
      position: absolute; bottom: 32px; left: 36px;
      font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(245,237,218,0.5);
    }

    .founder-content {
      display: flex; flex-direction: column; justify-content: center;
      padding: 80px 72px 80px 64px;
      position: relative;
    }
    .founder-content::before {
      content: ''; position: absolute; top: 10%; left: 0;
      width: 1px; height: 80%;
      background: linear-gradient(to bottom, transparent, rgba(201,168,76,0.3), transparent);
    }
    .founder-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .founder-eyebrow::before {
      content: ''; display: block; width: 32px; height: 1px;
      background: rgba(201,168,76,0.5);
    }
    .founder-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 3vw, 3.6rem);
      font-weight: 300; color: var(--warm-white);
      line-height: 1.15; margin-bottom: 8px;
    }
    .founder-title {
      font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 40px; opacity: 0.8;
    }
    .founder-ig {
      display: inline-block;
      font-size: 0.7rem; letter-spacing: 0.18em;
      color: var(--gold); text-decoration: none;
      margin-bottom: 36px;
      transition: color 0.3s;
    }
    .founder-ig:hover { color: var(--gold-light); }
    .founder-bio {
      font-size: 0.93rem; line-height: 2;
      color: var(--text-on-dark); margin-bottom: 20px;
    }
    .founder-bio p + p { margin-top: 18px; }
    .founder-quote {
      margin-top: 40px; padding-left: 24px;
      border-left: 1px solid rgba(201,168,76,0.4);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-style: italic; font-weight: 300;
      color: var(--gold-light); line-height: 1.6;
    }

    /* WAITLIST */
    .waitlist-band {
      padding: 120px 80px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 80px; align-items: center;
    }
    .waitlist-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3vw, 3.2rem);
      font-weight: 300; color: var(--warm-white);
      line-height: 1.25; margin-bottom: 20px;
    }
    .waitlist-heading em { font-style: italic; color: var(--gold-light); }
    .waitlist-sub { font-size: 0.9rem; line-height: 1.9; color: var(--text-on-dark); }
    .waitlist-right .form-row { max-width: 100%; }

    /* FOOTER */
    footer {
      padding: 56px 80px;
      border-top: 1px solid rgba(201,168,76,0.15);
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-logo { width: 160px; opacity: 0.7; }
    .footer-anchors {
      font-size: 0.67rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .footer-ig {
      font-size: 0.7rem; letter-spacing: 0.18em;
      color: var(--gold); text-decoration: none;
      transition: color 0.3s;
    }
    .footer-ig:hover { color: var(--gold-light); }
    .footer-note { font-size: 0.7rem; color: var(--text-muted); }

    /* RESPONSIVE */
    @media (max-width: 960px) {
      nav { padding: 20px 28px; }
      .framework { padding: 40px 28px 80px; }
      .anchors-grid { grid-template-columns: 1fr 1fr; }
      .mission { padding: 100px 28px; }
      .mission-body { padding: 40px 28px; }
      
      .founder { grid-template-columns: 1fr; }
      .founder-image-col { min-height: 55vw; max-height: 520px; }
      .founder-image-overlay {
        background: linear-gradient(to bottom, transparent 60%, var(--dark) 100%);
      }
      .founder-content { padding: 60px 32px; }
      .founder-content::before { display: none; }
      .waitlist-band { grid-template-columns: 1fr; gap: 48px; padding: 80px 28px; }
      .divider { padding: 48px 28px; }
      footer { padding: 40px 28px; flex-direction: column; gap: 20px; text-align: center; }
    }
    @media (max-width: 540px) {
      .anchors-grid { grid-template-columns: 1fr; }
      .form-row { flex-direction: column; }
      .form-row input { border-right: 1px solid rgba(201,168,76,0.25); border-bottom: none; }
      .hero-title { font-size: 2.4rem; }
    }
  </style>
</head>

    <a href="https://www.instagram.com/fouranchorscollective" target="_blank" class="nav-cta">@fouranchorscollective</a>
    <a href="#join" class="nav-cta">Join the Collective</a>
  </nav>
