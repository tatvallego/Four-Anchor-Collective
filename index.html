<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Four Anchors Collective</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-light: #e8d5a3;
      --gold-pale: #f5edda;
      --dark: #1a1410;
      --dark-2: #241c14;
      --dark-3: #2e2318;
      --cream: #f7f2e8;
      --warm-white: #fdfaf3;
      --text-on-dark: rgba(245,237,218,0.82);
      --text-muted: rgba(245,237,218,0.42);
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--dark);
      color: var(--cream);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes glowPulse {
      0%,100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.65; transform: scale(1.06); }
    }
    .reveal {
      opacity: 0; transform: translateY(24px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 24px 56px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(26,20,16,0.96), transparent);
    }
.nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gold-light);
    }
    .nav-cta {
      font-size: 0.68rem; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); text-decoration: none;
      border-bottom: 1px solid rgba(201,168,76,0.4); padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
    }
    .nav-cta:hover { color: var(--gold-light); border-color: var(--gold-light); }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      position: relative; overflow: hidden;
      padding: 120px 40px 100px;
    }
    .hero-glow {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 700px; height: 700px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
      animation: glowPulse 6s ease-in-out infinite;
      pointer-events: none;
    }
    .hero-glow-2 {
      position: absolute; top: 30%; left: 50%;
      transform: translate(-50%,-50%);
      width: 400px; height: 400px;
      background: radial-gradient(ellipse, rgba(232,213,163,0.08) 0%, transparent 70%);
      animation: glowPulse 8s ease-in-out infinite reverse;
      pointer-events: none;
    }
    .hero-logo {
      width: min(320px, 60vw);
      position: relative; z-index: 1;
      animation: fadeUp 1.4s ease 0.1s both;
      filter: drop-shadow(0 0 40px rgba(201,168,76,0.3));
    }
    .hero-eyebrow {
      font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 28px;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 0.5s both;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.6rem, 5vw, 5rem);
      font-weight: 300; line-height: 1.15;
      color: var(--warm-white); margin-bottom: 28px;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 0.7s both;
    }
    .hero-title em { font-style: italic; color: var(--gold-light); }
    .hero-sub {
      font-size: 1rem; line-height: 1.9;
      color: var(--text-on-dark); max-width: 520px; margin: 0 auto 48px;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 0.9s both;
    }
    .anchors-row {
      display: flex; gap: 12px; justify-content: center;
      margin-bottom: 52px; flex-wrap: wrap;
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 1.0s both;
    }
    .anchor-pill {
      font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase;
      padding: 8px 18px;
      border: 1px solid rgba(201,168,76,0.35);
      color: var(--gold-light);
      background: rgba(201,168,76,0.06);
    }
    .form-wrap {
      position: relative; z-index: 1;
      animation: fadeUp 1.2s ease 1.1s both;
      width: 100%; max-width: 480px;
    }
    .form-label {
      font-size: 0.67rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px; display: block;
    }
    .form-row { display: flex; }
    .form-row input {
      flex: 1; padding: 15px 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.25); border-right: none;
      font-family: 'Jost', sans-serif; font-size: 0.88rem;
      color: var(--cream); outline: none; transition: border-color 0.3s;
    }
    .form-row input::placeholder { color: rgba(245,237,218,0.28); }
    .form-row input:focus { border-color: rgba(201,168,76,0.6); }
    .form-row button {
      padding: 15px 28px; background: var(--gold); color: var(--dark);
      border: 1px solid var(--gold);
      font-family: 'Jost', sans-serif; font-size: 0.67rem;
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background 0.3s; white-space: nowrap;
    }
    .form-row button:hover { background: var(--gold-light); }
    .form-note { font-size: 0.72rem; color: var(--text-muted); margin-top: 12px; }
    .success-msg {
      display: none; font-size: 0.85rem;
      color: var(--gold-light); margin-top: 16px; font-style: italic;
    }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 28px; padding: 72px 80px;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, rgba(201,168,76,0.3), transparent);
    }
    .divider-icon { width: 48px; opacity: 0.5; }

    /* FRAMEWORK */
    .framework { padding: 40px 80px 120px; position: relative; }
    .framework::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.05), transparent 70%);
      pointer-events: none;
    }
    .section-label {
      font-size: 0.65rem; letter-spacing: 0.32em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 20px;
      display: flex; align-items: center; gap: 16px;
    }
